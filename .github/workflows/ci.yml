name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EcsEngine.slnx

      - name: Build
        run: dotnet build EcsEngine.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test EcsEngine.slnx --configuration Release --no-build

  aot-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT (linux-x64)
        run: dotnet publish src/EcsEngine.Runtime/EcsEngine.Runtime.csproj -c Release -r linux-x64 -p:PublishAot=true -o ./artifacts/aot/linux-x64
