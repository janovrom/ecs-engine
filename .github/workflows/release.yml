name: Release & SBOM

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EcsEngine.slnx

      - name: Build Release
        run: dotnet build EcsEngine.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test EcsEngine.slnx --configuration Release --no-build

      - name: Setup dotnet tools
        run: dotnet tool restore

      - name: Generate SBOM
        run: dotnet cyclonedx EcsEngine.slnx --output ./artifacts/sbom.spdx.json --json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./artifacts/sbom.spdx.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM to Release Assets
        uses: actions/upload-release-asset@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/sbom.spdx.json
          asset_name: sbom.spdx.json
          asset_content_type: application/json
